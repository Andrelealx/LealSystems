<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Leal Systems: software house brasileira B2B focada em produtos SaaS e sistemas sob encomenda para empresas."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      ;(() => {
        const storageKey = 'leal-systems-theme'
        const storedTheme = localStorage.getItem(storageKey)
        const shouldUseDark = storedTheme
          ? storedTheme === 'dark'
          : window.matchMedia('(prefers-color-scheme: dark)').matches

        document.documentElement.classList.toggle('dark', shouldUseDark)
        document.documentElement.style.colorScheme = shouldUseDark ? 'dark' : 'light'
      })()
    </script>
    <title>Leal Systems | Tecnologia · Confiança · Inovação</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
